services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - mongo
    environment:
      CLIENT_ORIGIN: http://localhost:3000
      JWT_SECRET: change-me-in-production-with-at-least-24-chars
      MONGODB_URI: mongodb://mongo:27017/aurora-music
      PORT: 4000
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"

volumes:
  mongo-data:
